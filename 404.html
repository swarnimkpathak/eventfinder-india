<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EventFinder India</title>
    <script>
      // GitHub Pages SPA redirect: store the path and redirect to index.html
      var repo = 'eventfinder-india';
      var l = window.location;
      var path = l.pathname.slice(1 + repo.length + 1); // strip /repo-name/
      l.replace(
        l.protocol + '//' + l.host + '/' + repo + '/?p=' +
        encodeURIComponent(path) +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
